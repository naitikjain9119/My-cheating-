<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App by Naitik Jain</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --primary: #007bff;
            --secondary: #f0f0f0;
            --nav-bg: #ffffff;
            --border: #ccc;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --primary: #bb86fc;
            --secondary: #1e1e1e;
            --nav-bg: #1f1f1f;
            --border: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow: hidden; }
        
        /* Utility */
        .hidden { display: none !important; }
        .btn { padding: 10px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
        .input-field { width: 100%; padding: 10px; margin-bottom: 10px; background: var(--secondary); color: var(--text-color); border: 1px solid var(--border); border-radius: 5px; }
        
        /* Layouts */
        .screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: absolute; top: 0; left: 0; background: var(--bg-color); }
        .header { text-align: center; padding: 10px; font-size: 12px; background: var(--secondary); border-bottom: 1px solid var(--border); }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 60px; }
        
        /* Auth Screen */
        #auth-screen { justify-content: center; padding: 20px; }
        .password-container { position: relative; }
        .eye-icon { position: absolute; right: 10px; top: 10px; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--nav-bg); border-top: 1px solid var(--border); }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; cursor: pointer; font-size: 14px; }
        .nav-item.active { color: var(--primary); font-weight: bold; border-top: 2px solid var(--primary); }

        /* Lists (Search, Notif, Home) */
        .user-card { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; }
        .user-bio { font-size: 12px; color: gray; }

        /* Chat Screen */
        .chat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--secondary); border-bottom: 1px solid var(--border); }
        .chat-header-info { display: flex; flex-direction: column; }
        .status-text { font-size: 10px; color: var(--primary); }
        .chat-actions button { margin-left: 5px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-color); }
        
        .chat-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 8px 12px; border-radius: 10px; position: relative; word-wrap: break-word;}
        .msg-sent { align-self: flex-end; background: var(--primary); color: white; }
        .msg-recv { align-self: flex-start; background: var(--secondary); }
        .msg-time { font-size: 8px; text-align: right; margin-top: 5px; opacity: 0.7; }
        .msg-edited { font-size: 8px; font-style: italic; opacity: 0.7; }

        .chat-input-area { display: flex; padding: 10px; background: var(--secondary); border-top: 1px solid var(--border); }
        .chat-input-area input { flex: 1; margin-bottom: 0; margin-right: 10px; }
        
        /* Long Press Menu */
        .context-menu { position: fixed; background: var(--nav-bg); border: 1px solid var(--border); box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 1000; display: none; flex-direction: column; border-radius: 5px;}
        .context-menu div { padding: 10px 20px; cursor: pointer; border-bottom: 1px solid var(--border); }
        
        /* Call UI */
        #call-screen { z-index: 2000; background: #111; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .call-buttons { display: flex; gap: 20px; margin-top: 30px; }
        .call-btn { padding: 15px; border-radius: 50%; font-size: 20px; border: none; cursor: pointer; }
        .btn-red { background: red; color: white; }
        .btn-green { background: green; color: white; }
        .btn-gray { background: #444; color: white; }
        #local-video, #remote-video { width: 100px; height: 150px; background: #000; margin: 10px; border-radius: 10px; object-fit: cover; }
        .video-container { display: flex; gap: 10px; }

        /* Notifications Toast */
        #top-notification { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 20px; z-index: 9999; display: none; }
        
        .typing-indicator { font-size: 10px; font-style: italic; color: gray; padding-left: 10px; }
        .emoji-picker { display: none; padding: 10px; background: var(--secondary); font-size: 20px; gap: 10px; overflow-x: auto; white-space: nowrap; }
    </style>
</head>
<body data-theme="dark">

    <!-- Top Toast Notification -->
    <div id="top-notification"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
        <h2 style="text-align:center; margin-bottom:20px;">Welcome</h2>
        <div id="login-form">
            <input type="email" id="login-email" class="input-field" placeholder="Email">
            <div class="password-container">
                <input type="password" id="login-pass" class="input-field" placeholder="Password">
                <span class="eye-icon" onclick="togglePass('login-pass')">👁️</span>
            </div>
            <button class="btn" style="width:100%" onclick="login()">Login</button>
            <p style="text-align:center; margin-top:10px; cursor:pointer;" onclick="showForgotPass()">Forgot Password?</p>
            <p style="text-align:center; margin-top:10px; cursor:pointer;" onclick="toggleAuth()">Create Account</p>
        </div>

        <div id="register-form" class="hidden">
            <input type="text" id="reg-name" class="input-field" placeholder="Full Name">
            <input type="email" id="reg-email" class="input-field" placeholder="Email">
            <div class="password-container">
                <input type="password" id="reg-pass" class="input-field" placeholder="Password">
                <span class="eye-icon" onclick="togglePass('reg-pass')">👁️</span>
            </div>
            <input type="text" id="reg-bio" class="input-field" placeholder="Your Bio">
            <button class="btn" style="width:100%" onclick="register()">Create Account</button>
            <p style="text-align:center; margin-top:10px; cursor:pointer;" onclick="toggleAuth()">Back to Login</p>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-screen" class="screen hidden">
        <div class="header">this website is made by naitik jain</div>
        
        <!-- Home Tab -->
        <div id="tab-home" class="content">
            <div id="unread-alert" style="color:var(--primary); font-size:12px; margin-bottom:10px;"></div>
            <h3>Friends</h3>
            <div id="friends-list"></div>
        </div>

        <!-- Search Tab -->
        <div id="tab-search" class="content hidden">
            <input type="text" id="search-input" class="input-field" placeholder="Search by name..." oninput="searchUsers()">
            <div id="search-results"></div>
        </div>

        <!-- Notification Tab -->
        <div id="tab-notif" class="content hidden">
            <h3>Friend Requests</h3>
            <div id="requests-list"></div>
        </div>

        <!-- Settings Tab -->
        <div id="tab-settings" class="content hidden">
            <h3>Settings</h3><br>
            <input type="text" id="set-name" class="input-field" placeholder="Name">
            <input type="text" id="set-bio" class="input-field" placeholder="Bio">
            <input type="password" id="set-pass" class="input-field" placeholder="New Password">
            <button class="btn" onclick="updateProfile()">Save Changes</button>
            <br><br>
            <h4>Theme</h4>
            <button class="btn btn-gray" onclick="setTheme('dark')">Dark Mode</button>
            <button class="btn btn-gray" onclick="setTheme('light')">Light Mode</button>
            <br><br>
            <label>Custom Color:</label>
            <input type="color" id="custom-color" onchange="setCustomTheme(this.value)">
            <br><br>
            <button class="btn btn-red" onclick="logout()">Logout</button>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home')">🏠<br>Home</div>
            <div class="nav-item" onclick="switchTab('search')">🔍<br>Search</div>
            <div class="nav-item" onclick="switchTab('notif')">🔔<br>Notif</div>
            <div class="nav-item" onclick="switchTab('settings')">⚙️<br>Settings</div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen hidden">
        <div class="chat-header">
            <button class="btn btn-gray" onclick="closeChat()">⬅ Back</button>
            <div class="chat-header-info">
                <strong id="chat-user-name">Name</strong>
                <span id="chat-user-bio" style="font-size:10px;">Bio</span>
                <span id="chat-user-status" class="status-text">Offline</span>
            </div>
            <div class="chat-actions">
                <button onclick="startCall('voice')">📞</button>
                <button onclick="startCall('video')">📹</button>
            </div>
        </div>
        <div class="chat-area" id="chat-area"></div>
        <div id="typing-indicator" class="typing-indicator hidden">Typing...</div>
        
        <div class="emoji-picker" id="emoji-picker">
            <span onclick="addEmoji('😀')">😀</span> <span onclick="addEmoji('😂')">😂</span> 
            <span onclick="addEmoji('❤️')">❤️</span> <span onclick="addEmoji('👍')">👍</span>
            <span onclick="addEmoji('🙏')">🙏</span> <span onclick="addEmoji('🔥')">🔥</span>
            <span onclick="addEmoji('😔')">😔</span> <span onclick="addEmoji('😡')">😡</span>
        </div>
        
        <div class="chat-input-area">
            <button class="btn btn-gray" onclick="toggleEmoji()">😀</button>
            <input type="text" id="msg-input" class="input-field" placeholder="Type a message..." oninput="handleTyping()">
            <button class="btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Call Screen -->
    <div id="call-screen" class="screen hidden">
        <h2 id="call-status-text">Calling...</h2>
        <h3 id="call-timer">00:00</h3>
        
        <div class="video-container" id="video-container" class="hidden">
            <video id="local-video" autoplay muted playsinline></video>
            <video id="remote-video" autoplay playsinline></video>
        </div>

        <div class="call-buttons">
            <button class="call-btn btn-green hidden" id="btn-accept" onclick="acceptCall()">📞</button>
            <button class="call-btn btn-red" id="btn-end" onclick="endCall()">☎</button>
            <button class="call-btn btn-gray" id="btn-mic" onclick="toggleMic()">🎤</button>
            <button class="call-btn btn-gray" id="btn-cam" onclick="toggleCam()">📷</button>
            <button class="call-btn btn-gray" id="btn-speaker" onclick="toggleSpeaker()">🔊</button>
        </div>
    </div>

    <!-- Context Menu for Long Press -->
    <div id="context-menu" class="context-menu">
        <div onclick="editMessage()">Edit</div>
        <div onclick="deleteMessage()">Delete</div>
        <div onclick="copyMessage()">Copy</div>
        <div onclick="viewReadTime()">Read Time</div>
    </div>

    <!-- Firebase JS SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, updatePassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, push, onValue, update, remove, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYmXP7k9GRIu0KICl7-z7AjyMptgH1n4s",
            authDomain: "cheating-app-f3269.firebaseapp.com",
            databaseURL: "https://cheating-app-f3269-default-rtdb.firebaseio.com",
            projectId: "cheating-app-f3269",
            storageBucket: "cheating-app-f3269.firebasestorage.app",
            messagingSenderId: "972918419121",
            appId: "1:972918419121:web:d339f4ea0d27651b49fc90"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Global State
        let currentUser = null;
        let currentChatUser = null;
        let currentChatId = null;
        let selectedMsgId = null;
        let pressTimer = null;
        let typingTimeout = null;

        // Audio for ringtone
        const ringtone = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');
        ringtone.loop = true;

        // --- UI Toggles ---
        window.toggleAuth = () => {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        };
        
        window.togglePass = (id) => {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            event.currentTarget.classList.add('active');
            if(tab === 'home') loadFriends();
            if(tab === 'notif') loadRequests();
            if(tab === 'settings') loadSettings();
        };

        // --- Authentication ---
        window.register = async () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const bio = document.getElementById('reg-bio').value;
            if(!name || !email || !pass) return alert("Fill required fields");
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, 'users/' + cred.user.uid), {
                    name, email, bio, status: 'online', lastSeen: Date.now(), theme: 'dark'
                });
                alert("Account created!");
            } catch (e) { alert(e.message); }
        };

        window.login = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { alert(e.message); }
        };

        window.showForgotPass = async () => {
            const email = prompt("Enter your email for password reset:");
            if(email) {
                try { await sendPasswordResetEmail(auth, email); alert("Reset link sent!"); }
                catch (e) { alert(e.message); }
            }
        };

        window.logout = () => {
            setPresence('offline');
            signOut(auth);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                setPresence('online');
                listenForCalls();
                listenForNotifications();
                switchTab('home');
            } else {
                currentUser = null;
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.add('hidden');
            }
        });

        // --- Presence & Settings ---
        function setPresence(status) {
            if(!currentUser) return;
            const userRef = ref(db, 'users/' + currentUser.uid);
            update(userRef, { status: status, lastSeen: serverTimestamp() });
            onDisconnect(userRef).update({ status: 'offline', lastSeen: serverTimestamp() });
        }

        window.loadSettings = async () => {
            const snap = await get(ref(db, 'users/' + currentUser.uid));
            if(snap.exists()) {
                document.getElementById('set-name').value = snap.val().name;
                document.getElementById('set-bio').value = snap.val().bio;
                if(snap.val().theme) setTheme(snap.val().theme, false);
            }
        };

        window.updateProfile = async () => {
            const name = document.getElementById('set-name').value;
            const bio = document.getElementById('set-bio').value;
            const pass = document.getElementById('set-pass').value;
            await update(ref(db, 'users/' + currentUser.uid), { name, bio });
            if(pass) {
                try { await updatePassword(currentUser, pass); alert("Password updated"); }
                catch(e) { alert("Failed to update password. Relogin required."); }
            }
            alert("Profile saved!");
        };

        window.setTheme = (mode, saveToDb = true) => {
            document.body.setAttribute('data-theme', mode);
            if(mode === 'light') { document.body.style.setProperty('--bg-color', '#fff'); document.body.style.setProperty('--text-color', '#000'); }
            if(mode === 'dark') { document.body.style.setProperty('--bg-color', '#121212'); document.body.style.setProperty('--text-color', '#fff'); }
            if(saveToDb) update(ref(db, 'users/' + currentUser.uid), { theme: mode });
        };
        window.setCustomTheme = (color) => {
            document.body.style.setProperty('--primary', color);
        };

        // --- Search & Requests ---
        window.searchUsers = async () => {
            const q = document.getElementById('search-input').value.toLowerCase();
            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = '';
            if(q.length < 1) return;
            
            const snap = await get(ref(db, 'users'));
            snap.forEach(child => {
                const u = child.val();
                if(child.key !== currentUser.uid && u.name.toLowerCase().includes(q)) {
                    resDiv.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <span class="user-name">${u.name}</span>
                                <span class="user-bio">${u.bio}</span>
                            </div>
                            <button class="btn" onclick="addFriend('${child.key}')">Add Friend</button>
                        </div>`;
                }
            });
        };

        window.addFriend = async (uid) => {
            await set(ref(db, `requests/${uid}/${currentUser.uid}`), true);
            alert("Request sent!");
        };

        window.loadRequests = () => {
            const reqRef = ref(db, `requests/${currentUser.uid}`);
            onValue(reqRef, async (snap) => {
                const list = document.getElementById('requests-list');
                list.innerHTML = '';
                if(!snap.exists()) return;
                
                for(const [uid, val] of Object.entries(snap.val())) {
                    const uSnap = await get(ref(db, `users/${uid}`));
                    if(uSnap.exists()) {
                        const u = uSnap.val();
                        list.innerHTML += `
                            <div class="user-card">
                                <div class="user-info">
                                    <span class="user-name">${u.name}</span>
                                    <span class="user-bio">${u.bio}</span>
                                </div>
                                <div>
                                    <button class="btn" style="background:green" onclick="handleReq('${uid}', true)">Accept</button>
                                    <button class="btn" style="background:red" onclick="handleReq('${uid}', false)">Reject</button>
                                </div>
                            </div>`;
                    }
                }
            });
        };

        window.handleReq = async (uid, accept) => {
            if(accept) {
                await set(ref(db, `friends/${currentUser.uid}/${uid}`), true);
                await set(ref(db, `friends/${uid}/${currentUser.uid}`), true);
            }
            await remove(ref(db, `requests/${currentUser.uid}/${uid}`));
            if(accept) switchTab('home');
        };

        // --- Home & Chat List ---
        window.loadFriends = () => {
            onValue(ref(db, `friends/${currentUser.uid}`), async (snap) => {
                const list = document.getElementById('friends-list');
                list.innerHTML = '';
                if(!snap.exists()) return;

                for(const uid of Object.keys(snap.val())) {
                    const uSnap = await get(ref(db, `users/${uid}`));
                    if(uSnap.exists()) {
                        const u = uSnap.val();
                        list.innerHTML += `
                            <div class="user-card" style="cursor:pointer" onclick="openChat('${uid}', '${u.name}', '${u.bio}')">
                                <div class="user-info">
                                    <span class="user-name">${u.name}</span>
                                    <span class="user-bio">${u.bio}</span>
                                </div>
                            </div>`;
                    }
                }
            });
        };

        window.listenForNotifications = () => {
            // Check unread messages broadly
            onValue(ref(db, 'chats'), (snap) => {
                let unreadCount = 0;
                let lastSender = "";
                snap.forEach(chat => {
                    if(chat.key.includes(currentUser.uid)) {
                        const msgs = chat.child('messages').val();
                        if(msgs) {
                            Object.values(msgs).forEach(m => {
                                if(m.sender !== currentUser.uid && !m.readTime) {
                                    unreadCount++;
                                    lastSender = m.senderName || "Someone";
                                }
                            });
                        }
                    }
                });
                const alertDiv = document.getElementById('unread-alert');
                if(unreadCount > 0) {
                    alertDiv.innerText = `${lastSender} sent ${unreadCount} new message(s)`;
                    showTopNotif(`${lastSender} sent ${unreadCount} new message(s)`);
                } else {
                    alertDiv.innerText = '';
                }
            });
        };

        window.showTopNotif = (msg) => {
            const div = document.getElementById('top-notification');
            div.innerText = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        };

        // --- Chat Interface ---
        window.openChat = (uid, name, bio) => {
            currentChatUser = uid;
            currentChatId = currentUser.uid < uid ? `${currentUser.uid}_${uid}` : `${uid}_${currentUser.uid}`;
            
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-bio').innerText = bio;
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            
            listenToChat();
            listenToPresence(uid);
            listenToTyping();
            
            // Mark unread as read
            get(ref(db, `chats/${currentChatId}/messages`)).then(snap => {
                if(snap.exists()){
                    const updates = {};
                    snap.forEach(m => {
                        if(m.val().sender !== currentUser.uid && !m.val().readTime) {
                            updates[`${m.key}/readTime`] = Date.now();
                        }
                    });
                    if(Object.keys(updates).length > 0) update(ref(db, `chats/${currentChatId}/messages`), updates);
                }
            });
        };

        window.closeChat = () => {
            currentChatUser = null;
            document.getElementById('chat-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        };

        window.toggleEmoji = () => {
            const picker = document.getElementById('emoji-picker');
            picker.style.display = picker.style.display === 'flex' ? 'none' : 'flex';
        };
        window.addEmoji = (em) => {
            document.getElementById('msg-input').value += em;
            toggleEmoji();
        };

        window.handleTyping = () => {
            set(ref(db, `typing/${currentChatId}/${currentUser.uid}`), true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                remove(ref(db, `typing/${currentChatId}/${currentUser.uid}`));
            }, 2000);
        };

        function listenToTyping() {
            onValue(ref(db, `typing/${currentChatId}/${currentChatUser}`), (snap) => {
                const ind = document.getElementById('typing-indicator');
                if(snap.exists()) ind.classList.remove('hidden');
                else ind.classList.add('hidden');
            });
        }

        function listenToPresence(uid) {
            onValue(ref(db, `users/${uid}`), (snap) => {
                if(snap.exists()){
                    const s = snap.val();
                    const el = document.getElementById('chat-user-status');
                    if(s.status === 'online') el.innerText = 'Online';
                    else {
                        const d = new Date(s.lastSeen);
                        el.innerText = `Last seen: ${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
                    }
                }
            });
        }

        window.sendMessage = async () => {
            const text = document.getElementById('msg-input').value;
            if(!text.trim()) return;
            
            const msgRef = push(ref(db, `chats/${currentChatId}/messages`));
            
            // Get my name for notification
            const mySnap = await get(ref(db, `users/${currentUser.uid}`));
            const myName = mySnap.val().name;

            await set(msgRef, {
                text: text,
                sender: currentUser.uid,
                senderName: myName,
                timestamp: Date.now(),
                edited: false,
                readTime: null,
                deletedFor: null
            });
            document.getElementById('msg-input').value = '';
            remove(ref(db, `typing/${currentChatId}/${currentUser.uid}`));
        };

        function formatTime(ts) {
            return new Date(ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function listenToChat() {
            onValue(ref(db, `chats/${currentChatId}/messages`), (snap) => {
                const area = document.getElementById('chat-area');
                area.innerHTML = '';
                if(!snap.exists()) return;
                
                snap.forEach(child => {
                    const msg = child.val();
                    const msgId = child.key;
                    
                    if(msg.deletedFor === 'everyone' || msg.deletedFor === currentUser.uid) return;

                    const isMe = msg.sender === currentUser.uid;
                    let cls = isMe ? 'msg-sent' : 'msg-recv';
                    let editTag = msg.edited ? `<div class="msg-edited">Edited</div>` : '';
                    let timeStr = formatTime(msg.timestamp);

                    const div = document.createElement('div');
                    div.className = `message ${cls}`;
                    div.innerHTML = `
                        <span>${msg.text}</span>
                        ${editTag}
                        <div class="msg-time">${timeStr}</div>
                    `;
                    
                    // Long press logic
                    div.addEventListener('touchstart', (e) => startPress(e, msgId, isMe, msg.timestamp, msg.readTime, msg.text));
                    div.addEventListener('touchend', cancelPress);
                    div.addEventListener('mousedown', (e) => startPress(e, msgId, isMe, msg.timestamp, msg.readTime, msg.text));
                    div.addEventListener('mouseup', cancelPress);
                    div.addEventListener('mouseleave', cancelPress);

                    area.appendChild(div);
                });
                area.scrollTop = area.scrollHeight;
            });
        }

        // --- Context Menu (Long Press) ---
        let pressData = {};
        function startPress(e, msgId, isMe, timestamp, readTime, text) {
            pressTimer = setTimeout(() => {
                pressData = { msgId, isMe, timestamp, readTime, text };
                showContextMenu(e);
            }, 2000); // 2 second long press
        }
        function cancelPress() { clearTimeout(pressTimer); }

        function showContextMenu(e) {
            const menu = document.getElementById('context-menu');
            menu.style.display = 'flex';
            // Simple positioning
            menu.style.left = '50px';
            menu.style.top = '50px';
        }

        document.addEventListener('click', (e) => {
            if(!e.target.closest('#context-menu')) {
                document.getElementById('context-menu').style.display = 'none';
            }
        });

        window.copyMessage = () => {
            navigator.clipboard.writeText(pressData.text);
            document.getElementById('context-menu').style.display = 'none';
            alert("Copied!");
        };

        window.viewReadTime = () => {
            document.getElementById('context-menu').style.display = 'none';
            if(!pressData.isMe) return alert("You can only see read time for your messages.");
            if(pressData.readTime) {
                alert("Read at: " + new Date(pressData.readTime).toLocaleString());
            } else {
                alert("Not read yet.");
            }
        };

        window.editMessage = () => {
            document.getElementById('context-menu').style.display = 'none';
            if(!pressData.isMe) return alert("Cannot edit others' messages.");
            const newText = prompt("Edit message:", pressData.text);
            if(newText) {
                update(ref(db, `chats/${currentChatId}/messages/${pressData.msgId}`), {
                    text: newText, edited: true
                });
            }
        };

        window.deleteMessage = () => {
            document.getElementById('context-menu').style.display = 'none';
            const timeDiff = Date.now() - pressData.timestamp;
            const fifteenMins = 15 * 60 * 1000;
            
            if(pressData.isMe && timeDiff <= fifteenMins) {
                if(confirm("Delete for everyone?")) {
                    update(ref(db, `chats/${currentChatId}/messages/${pressData.msgId}`), { deletedFor: 'everyone' });
                }
            } else {
                if(confirm("Delete for me?")) {
                    update(ref(db, `chats/${currentChatId}/messages/${pressData.msgId}`), { deletedFor: currentUser.uid });
                }
            }
        };

        window.deleteCallHistory = async (msgId) => {
             update(ref(db, `chats/${currentChatId}/messages/${msgId}`), { deletedFor: currentUser.uid });
        }


        // --- Voice / Video Call Logic (Signaling via Firebase) ---
        let callTimerInt;
        let callSeconds = 0;
        let activeCallType = null;

        window.startCall = (type) => {
            activeCallType = type;
            document.getElementById('call-screen').classList.remove('hidden');
            document.getElementById('call-status-text').innerText = `Calling ${document.getElementById('chat-user-name').innerText}...`;
            document.getElementById('btn-accept').classList.add('hidden');
            document.getElementById('btn-end').classList.remove('hidden');
            if(type === 'video') document.getElementById('video-container').classList.remove('hidden');
            else document.getElementById('video-container').classList.add('hidden');

            set(ref(db, `calls/${currentChatUser}`), {
                caller: currentUser.uid,
                type: type,
                status: 'ringing',
                timestamp: Date.now()
            });

            // Listen for answer
            onValue(ref(db, `calls/${currentChatUser}`), (snap) => {
                if(snap.exists() && snap.val().status === 'answered') {
                    startCallTimer();
                    document.getElementById('call-status-text').innerText = "Connected";
                }
                if(snap.exists() && snap.val().status === 'declined') {
                    alert("Call declined");
                    endCallUI();
                }
            });
        };

        function listenForCalls() {
            onValue(ref(db, `calls/${currentUser.uid}`), async (snap) => {
                if(snap.exists()) {
                    const call = snap.val();
                    if(call.status === 'ringing') {
                        ringtone.play();
                        currentChatUser = call.caller; // Set context
                        const uSnap = await get(ref(db, `users/${call.caller}`));
                        const callerName = uSnap.val().name;
                        
                        document.getElementById('call-screen').classList.remove('hidden');
                        document.getElementById('call-status-text').innerText = `Incoming ${call.type} call from ${callerName}`;
                        document.getElementById('btn-accept').classList.remove('hidden');
                        document.getElementById('btn-end').classList.remove('hidden');
                        activeCallType = call.type;
                        if(call.type === 'video') document.getElementById('video-container').classList.remove('hidden');
                        else document.getElementById('video-container').classList.add('hidden');
                    }
                    if(call.status === 'ended') {
                        endCallUI();
                    }
                }
            });
        }

        window.acceptCall = () => {
            ringtone.pause();
            update(ref(db, `calls/${currentUser.uid}`), { status: 'answered' });
            document.getElementById('btn-accept').classList.add('hidden');
            document.getElementById('call-status-text').innerText = "Connected";
            startCallTimer();
            // In a full WebRTC app, here we would exchange ICE candidates and setup peer connections.
            // Due to single-file browser limits, we simulate connection state UI here.
            if(activeCallType === 'video') setupLocalMedia();
        };

        window.endCall = () => {
            // Log history
            if(currentChatUser && currentChatId) {
                push(ref(db, `chats/${currentChatId}/messages`), {
                    text: `📞 ${activeCallType} call ended. Duration: ${document.getElementById('call-timer').innerText}`,
                    sender: currentUser.uid, timestamp: Date.now(), edited: false
                });
            }
            
            // Notify other side
            update(ref(db, `calls/${currentChatUser}`), { status: 'ended' });
            update(ref(db, `calls/${currentUser.uid}`), { status: 'declined' }); // self clear
            
            setTimeout(() => {
                remove(ref(db, `calls/${currentChatUser}`));
                remove(ref(db, `calls/${currentUser.uid}`));
            }, 1000);

            endCallUI();
        };

        function endCallUI() {
            ringtone.pause();
            clearInterval(callTimerInt);
            callSeconds = 0;
            document.getElementById('call-timer').innerText = "00:00";
            document.getElementById('call-screen').classList.add('hidden');
            if(localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
        }

        function startCallTimer() {
            clearInterval(callTimerInt);
            callSeconds = 0;
            callTimerInt = setInterval(() => {
                callSeconds++;
                const m = String(Math.floor(callSeconds/60)).padStart(2,'0');
                const s = String(callSeconds%60).padStart(2,'0');
                document.getElementById('call-timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        // Call Media Toggles
        let localStream = null;
        let micOn = true;
        let camOn = true;
        let speakerOn = true;

        async function setupLocalMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
            } catch(e) { console.error("Media error", e); }
        }

        window.toggleMic = () => {
            micOn = !micOn;
            document.getElementById('btn-mic').style.background = micOn ? '#444' : 'red';
            if(localStream) localStream.getAudioTracks()[0].enabled = micOn;
        };
        window.toggleCam = () => {
            camOn = !camOn;
            document.getElementById('btn-cam').style.background = camOn ? '#444' : 'red';
            if(localStream) localStream.getVideoTracks()[0].enabled = camOn;
        };
        window.toggleSpeaker = () => {
            speakerOn = !speakerOn;
            document.getElementById('btn-speaker').style.background = speakerOn ? '#444' : 'red';
            alert(speakerOn ? "Speaker ON" : "Speaker OFF (Ear/Muted)");
        };

    </script>
</body>
</html>
